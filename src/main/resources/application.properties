server.port=${PORT:8080}

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/farmcare_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root123}

# Prevent Hibernate from crashing without metadata
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Prevent Hikari pool from crashing the app on startup if DB is down
spring.datasource.hikari.initialization-fail-timeout=-1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Gemini API Integration
gemini.api.key=${GEMINI_API_KEY:}